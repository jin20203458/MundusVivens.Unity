syntax = "proto3";

option csharp_namespace = "MundusVivens.Prototype.Protos";

package mundusvivens;

service MundusVivensGrpc {
  rpc TriggerDialogue (TriggerDialogueRequest) returns (TriggerDialogueResponse);
  rpc GetAgentStatus (GetAgentStatusRequest) returns (GetAgentStatusResponse);
  rpc InjectGossip (InjectGossipRequest) returns (InjectGossipResponse);
  rpc UpdateAgentStatus (UpdateAgentStatusRequest) returns (UpdateAgentStatusResponse);
  rpc ProcessWorldTick (ProcessWorldTickRequest) returns (ProcessWorldTickResponse);

  // 🆕 비동기 대화 결과 조회 (Phase 4-A 신규)
  rpc GetDialogueResult (GetDialogueResultRequest) returns (GetDialogueResultResponse);

  // 🆕 관찰자 모드: 실시간 이벤트 스트림 구독 (Phase 4-B 신규)
  rpc SubscribeWorldEvents (SubscribeRequest) returns (stream WorldEvent);
}

message TriggerDialogueRequest {
  string agent_id_a = 1;
  string agent_id_b = 2;
  bool wait_for_completion = 3;
}

message TriggerDialogueResponse {
  string task_id = 1;
  bool is_queued = 2;
  bool completed_immediately = 3;
  string dialogue_summary = 4;
  repeated string dialogue_lines = 5;
  repeated DialogueLine structured_lines = 6; // 🆕 구조화된 대사 데이터 (하위호환 유지하며 추가)
}

message GetAgentStatusRequest {
  string agent_id = 1;
}

message GetAgentStatusResponse {
  string name = 1;
  string location = 2;
  string emotion = 3;
  string activity = 4;
  repeated string memories = 5;
}

message InjectGossipRequest {
  string subject_id = 1;
  string content = 2;
  string target_agent_id = 3;
}

message InjectGossipResponse {
  bool success = 1;
  string message = 2;
}

message UpdateAgentStatusRequest {
  string agent_id = 1;
  string location = 2;
  string emotion = 3;
  string activity = 4;
}

message UpdateAgentStatusResponse {
  bool success = 1;
  string message = 2;
}

message ProcessWorldTickRequest {
  int32 tick_number = 1;
}

message ProcessWorldTickResponse {
  bool success = 1;
  string message = 2;
}

message DialogueLine {
  string speaker_id = 1;     // 화자 에이전트 ID (예: "npc_eva")
  string speaker_name = 2;   // 화자 표시 이름 (예: "에바")
  string text = 3;           // 대사 내용
}

message GetDialogueResultRequest {
  string task_id = 1;
}

message GetDialogueResultResponse {
  string task_id = 1;
  bool is_completed = 2;        // 아직 진행 중이면 false
  string dialogue_summary = 3;
  repeated DialogueLine lines = 4;  // 구조화된 대사
}

message SubscribeRequest {
  string subscriber_id = 1;
}

message WorldEvent {
  int64 timestamp = 1;
  oneof event {
    DialogueEvent dialogue = 2;       // 대화 시작/진행/종료
    MovementEvent movement = 3;       // NPC 이동
    GossipEvent gossip = 4;           // 소문 전파 발생
    RelationshipEvent relationship = 5; // 관계도 변화
    TickEvent tick = 6;               // 틱 진행
  }
}

message DialogueEvent {
  string task_id = 1;
  string agent_a_id = 2;
  string agent_b_id = 3;
  string location = 4;
  repeated DialogueLine lines = 5;    // 대화 완료 시 채워짐
  string summary = 6;
  bool is_started = 7;               // true=시작, false=완료
}

message MovementEvent {
  string agent_id = 1;
  string from_location = 2;
  string to_location = 3;
}

message GossipEvent {
  string speaker_id = 1;
  string listener_id = 2;
  string subject_id = 3;
  string gossip_content = 4;
  bool is_mutated = 5;               // 와전 여부
}

message RelationshipEvent {
  string from_agent_id = 1;
  string to_agent_id = 2;
  int32 new_affinity = 3;
  int32 affinity_delta = 4;
  int32 new_trust = 5;
  int32 trust_delta = 6;
}

message TickEvent {
  int32 tick_number = 1;
}
